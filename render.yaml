services:
  - type: web
    name: cav-photostudio-and-cafe-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./frontend/build
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://accounts.google.com; connect-src 'self' https://cav-photostudio-and-cafe.onrender.com http://localhost:* http://127.0.0.1:* capacitor://localhost; frame-src https://accounts.google.com"
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Permissions-Policy
        value: camera=(), geolocation=(), microphone=(), payment=(), usb=()
